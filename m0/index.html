<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M0 — Cadrul românesc al competențelor în sănătate digitală</title>
    <link rel="stylesheet" href="https://unpkg.com/reveal.js@5.1.0/dist/reveal.css" />
    <link rel="stylesheet" href="https://unpkg.com/reveal.js@5.1.0/dist/theme/black.css" />
    <link rel="stylesheet" href="css/custom.css" />
    <link rel="stylesheet" href="css/m0-enhancements.css" />
  </head>
  <body>
    <div class="reveal">
      <div class="course-brand" aria-hidden="true">
        <img
          src="https://www.srimed.ro/wp-content/uploads/2025/08/RO_Official_Logo_SRIMED-02-2048x512.png"
          alt="Societatea Română de Informatică Medicală"
          width="2048"
          height="512"
          decoding="async"
        />
        <span class="course-brand__label">Modulul 0</span>
      </div>
      <div class="slides">
        <section
          data-markdown="slides.md"
          data-separator="^\n---\n$"
          data-separator-vertical="^\n--\n$"
        ></section>
      </div>
    </div>
    <script src="https://unpkg.com/reveal.js@5.1.0/dist/reveal.js"></script>
    <script src="https://unpkg.com/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
    <script src="https://unpkg.com/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
    <script src="https://unpkg.com/reveal.js@5.1.0/plugin/notes/notes.js"></script>
    <script>
      Reveal.initialize({
        hash: true,
        slideNumber: "c/t",
        transition: "convex",
        backgroundTransition: "fade",
        width: 1280,
        height: 720,
        margin: 0.04,
        minScale: 0.15,
        maxScale: 2,
        autoAnimate: true,
        autoAnimateEasing: "ease-out",
        autoAnimateDuration: 0.55,
        plugins: [RevealMarkdown, RevealHighlight, RevealNotes],
        markdown: {
          smartypants: true,
        },
      });
    </script>
  </body>
</html>
