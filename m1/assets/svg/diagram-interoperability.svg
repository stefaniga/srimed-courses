<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" role="img" aria-labelledby="t7">
  <title id="t7">Dimensiuni interoperabilitate</title>
  <rect x="6" y="6" width="628" height="188" rx="10" fill="rgba(6,27,46,0.45)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="320" y="34" text-anchor="middle" fill="#b8d4f0" font-family="system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="0.05em">INTEROPERABILITATE — DIMENSIUNI COMPLEMENTARE</text>
  <g font-family="system-ui,sans-serif">
    <rect x="40" y="56" width="170" height="120" rx="8" fill="#104b86" stroke="#6ebe46" stroke-width="1.3"/>
    <text x="125" y="92" text-anchor="middle" fill="#6ebe46" font-size="12" font-weight="700">Tehnică</text>
    <text x="125" y="118" text-anchor="middle" fill="#e8f0f8" font-size="10">API, mesaje,</text>
    <text x="125" y="134" text-anchor="middle" fill="#e8f0f8" font-size="10">formate, transport</text>
    <rect x="235" y="56" width="170" height="120" rx="8" fill="#104b86" stroke="#8ed56a" stroke-width="1.3"/>
    <text x="320" y="92" text-anchor="middle" fill="#8ed56a" font-size="12" font-weight="700">Semantică</text>
    <text x="320" y="118" text-anchor="middle" fill="#e8f0f8" font-size="10">Coduri, ontologii,</text>
    <text x="320" y="134" text-anchor="middle" fill="#e8f0f8" font-size="10">semnificație comună</text>
    <rect x="430" y="56" width="170" height="120" rx="8" fill="#104b86" stroke="#6ebe46" stroke-width="1.3"/>
    <text x="515" y="92" text-anchor="middle" fill="#6ebe46" font-size="12" font-weight="700">Organiza&#539;ional&#259;</text>
    <text x="515" y="118" text-anchor="middle" fill="#e8f0f8" font-size="10">Procese, roluri,</text>
    <text x="515" y="134" text-anchor="middle" fill="#e8f0f8" font-size="10">acorduri, guvernanță</text>
